providers:
  openai:
    type: openai
    base_url: https://api.openai.com/v1
    model: gpt-4o
    encoding: cl100k_base
    credentials:
      apiKey:
    temperature: 0.4
    maxTokens: 4096
    rateLimit:
      requestsPerMinute: 120
sandbox:
  paths:
    - "./"
    - "!node_modules/"
    - "/tmp"
  skillScanPaths:
    - "system-skills/"
    - "skills/"
  timeout:
    seconds: 600
    gracePeriod: 5
  memoryLimit: 128mb
  safety:
    urlFilter: true
    pythonImportHook: true
  env:
    allowlist:
      - PATH
      - HOME
      - NODE_ENV
      - OPENAI_API_KEY
      - AUTH_API_KEY
  permissions:
    - filesystem:read
    - filesystem:write
    - filesystem:exec
    - process:spawn
    - network:outbound
  maxReadSize: 10mb
memory:
  directory: memory/
  contextDir: memory/context/
  toolsDir: memory/tools/
  errorsDir: memory/errors/
  schedulesDir: memory/schedules/
  gc:
    enabled: true
    idleTimeoutMs: 300000
    maxGcPerHour: 4
telemetry:
  enabled: false
  exporter:
    protocol: console
    endpoint: http://localhost:4318
    batch:
      maxSize: 512
      scheduledDelay: 5000
  sampling:
    ratio: 0.1
  redact:
    paths:
      - credentials.apiKey
      - headers.authorization
      - request.headers.x-api-key
schedules:
  maxConcurrent: 1
  syncOnInit: true
  entries: []
tui:
  name: madz
  cursorChar: "█"
agent:
  recursionLimit: 1000
  autoContinueLimit: 1000
  nodeTimeout: 600000
  turnHashWindow: 20
  turnBufferMax: 64
  promptRewrite:
    enabled: true
lru:
  size: 100
  ttl: 600000
process:
  subAgent:
    timeout: 600000
    maxConcurrent: 4
    sessionMode: isolated
    defaultStrategy: parallel
    defaultOnError: continue
    temperature: 0.7
persistence:
  mode: memory
  sqlite_path: memory/checkpoints.db
cwd: ""
