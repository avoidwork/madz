providers:
  openai:
    type: openai
    base_url: https://api.openai.com/v1
    model: gpt-4o
    credentials:
      apiKey:
    temperature: 0.7
    maxTokens: 4096
    rateLimit:
      requestsPerMinute: 120
sandbox:
  paths:
    - memory/
    - skills/
    - tmp/
    - src/
    - ./
  timeout:
    seconds: 30
    gracePeriod: 5
  memoryLimit: 512m
  safety:
    urlFilter: true
    pythonImportHook: true
  env:
    allowlist:
      - PATH
      - HOME
      - NODE_ENV
      - OPENAI_API_KEY
      - AUTH_API_KEY
  permissions:
    - filesystem:read
    - filesystem:write
    - filesystem:exec
    - process:spawn
    - network:outbound
  maxReadSize: 1mb
memory:
  directory: memory/
  contextDir: memory/context/
  toolsDir: memory/tools/
  errorsDir: memory/errors/
  schedulesDir: memory/schedules/
telemetry:
  enabled: false
  exporter:
    protocol: console
    endpoint: http://localhost:4318
    batch:
      maxSize: 512
      scheduledDelay: 5000
  sampling:
    ratio: 0.1
  redact:
    paths:
      - credentials.apiKey
      - headers.authorization
      - request.headers.x-api-key
schedules:
  maxConcurrent: 1
  entries: []
tui:
  name: madz
  cursorChar: "█"
persistence:
  mode: memory
  sqlite_path: memory/checkpoints.db
