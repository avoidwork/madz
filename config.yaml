providers:
  openai:
    type: openai
    base_url: http://10.1.2.60:8000/v1
    model: Qwen/Qwen3.6-35B-A3B-FP8
    credentials:
      apiKey: "abc"
    temperature: 0.7
    maxTokens: 40960
    rateLimit:
      requestsPerMinute: 120
inference:
  temperature: 0.7
  maxTokens: 4096
sandbox:
  paths:
    - memory/
    - skills/
    - tmp/
  timeout:
    seconds: 30
    gracePeriod: 5
  memoryLimit: 512m
  env:
    allowlist:
      - PATH
      - HOME
      - NODE_ENV
      - OPENAI_API_KEY
      - AUTH_API_KEY
  permissions:
    - filesystem:read
    - filesystem:write
    - filesystem:exec
    - process:spawn
  maxReadSize: 1mb
memory:
  directory: memory/
  contextDir: memory/context/
  toolsDir: memory/tools/
  errorsDir: memory/errors/
  schedulesDir: memory/schedules/
  indexFile: memory/_index.md
  retention:
    days: 90
    maxEntries: 1000
telemetry:
  enabled: false
  exporter:
    protocol: console
    endpoint: http://localhost:4318
    batch:
      maxSize: 512
      scheduledDelay: 5000
  sampling:
    ratio: 0.1
  redact:
    paths:
      - credentials.apiKey
      - headers.authorization
      - request.headers.x-api-key
schedules:
  maxConcurrent: 1
  entries:
    - name: daily-host-report
      cron: 0 9 * * *
      skill: host-info
      input: {}
      contextFile: ''
    - name: weekly-api-check
      cron: 0 6 * * 1
      skill: api-request
      input:
        url: https://api.example.com/health
        method: GET
      contextFile: memory/context/api-endpoints.md
session:
  context_window_size: 20
  conversationsDir: memory/conversations/
tui:
  name: madz
