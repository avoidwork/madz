name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "*.js"
      - "src/**/*.js"
      - "tests/**/*.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/*.yml"

jobs:
  check:
    name: ${{ matrix.job }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        job: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.job }}
        run: npm run ${{ matrix.job }}
