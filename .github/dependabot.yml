version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "avoidwork"
    commit-message:
      prefix: "chore(deps)"
    groups:
      langgraph:
        patterns:
          - "@langchain/*"
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
    automerge: true
    versioning-strategy: increase

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "avoidwork"
    commit-message:
      prefix: "chore(actions)"
    automerge: true
